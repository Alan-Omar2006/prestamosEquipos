<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña – UTHH</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .pass-wrapper { position:relative }
    .pass-wrapper .toggle-vis {
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:#888;padding:0;font-size:15px;
    }
    .strength-bar {
      height:4px;border-radius:2px;background:#e0e0e0;margin:6px 0 12px;overflow:hidden;
    }
    .strength-bar-fill { height:100%;border-radius:2px;width:0%;transition:width .3s,background .3s }
    .req-list { list-style:none;padding:0;margin:0 0 14px;display:flex;flex-direction:column;gap:5px }
    .req-list li {
      display:flex;align-items:center;gap:8px;font-size:.82em;color:#888;transition:color .2s;
    }
    .req-list li .dot {
      width:13px;height:13px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;
      transition:background .2s,border-color .2s;
    }
    .req-list li.pass { color:#2e7d32 }
    .req-list li.pass .dot { background:#4caf50;border-color:#4caf50 }
    .req-list li.fail { color:#c62828 }
    .req-list li.fail .dot { background:#ef5350;border-color:#ef5350 }
    .req-list li.optional { color:#888 }
    .req-list li.optional .dot { border-style:dashed }
    .req-list li.optional.pass { color:#2e7d32 }
    .req-list li.optional.pass .dot { background:#4caf50;border-color:#4caf50;border-style:solid }
    .conf-msg { font-size:.82em;min-height:16px;margin:4px 0 0 }
  </style>
</head>
<body style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f4ff">

  <div style="background:#fff;padding:40px;border-radius:16px;
              box-shadow:0 8px 32px rgba(0,0,0,.12);width:100%;max-width:420px">

    <div style="text-align:center;margin-bottom:24px">
      <img src="../img/logo.png" alt="UTHH" style="height:56px;margin-bottom:12px"
           onerror="this.style.display='none'">
      <h2 style="color:#1a237e;margin:0">Nueva contraseña</h2>
      <p style="color:#888;font-size:.88em;margin-top:6px">Ingresa tu nueva contraseña</p>
    </div>

    <!-- Nueva contraseña -->
    <div class="pass-wrapper">
      <input type="password" id="nuevaPass" placeholder="Nueva contraseña" autocomplete="new-password"
             oninput="onPassInput(this.value)" style="width:100%;padding:12px 38px 12px 20px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:Poppins,sans-serif;outline:none;box-sizing:border-box">
      <button class="toggle-vis" type="button" tabindex="-1" onclick="toggleVis('nuevaPass',this)">
        <i class="fas fa-eye"></i>
      </button>
    </div>

    <!-- Barra de fortaleza -->
    <div class="strength-bar" id="strengthBar" style="margin-top:6px;display:none">
      <div class="strength-bar-fill" id="strengthFill"></div>
    </div>

    <!-- Indicador de requisitos -->
    <ul class="req-list" id="reqList" style="display:none;margin-bottom:8px">
      <li id="req-len"     class=""><span class="dot"></span>Mínimo 8 caracteres</li>
      <li id="req-upper"   class=""><span class="dot"></span>Al menos una mayúscula</li>
      <li id="req-num"     class=""><span class="dot"></span>Al menos un número</li>
      <li id="req-special" class="optional"><span class="dot"></span>Carácter especial (opcional)</li>
    </ul>

    <!-- Confirmar contraseña -->
    <div class="pass-wrapper" style="margin-top:14px">
      <input type="password" id="confirmarPass" placeholder="Confirmar contraseña" autocomplete="off"
             oninput="onConfInput()" style="width:100%;padding:12px 38px 12px 20px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:Poppins,sans-serif;outline:none;box-sizing:border-box">
      <button class="toggle-vis" type="button" tabindex="-1" onclick="toggleVis('confirmarPass',this)">
        <i class="fas fa-eye"></i>
      </button>
    </div>
    <p class="conf-msg" id="confMsg"></p>

    <button class="btn-submit" id="btnReset" style="width:100%;margin-top:16px;opacity:.5;cursor:not-allowed" disabled>
      Guardar contraseña
    </button>

    <p id="resetMsg"
       style="text-align:center;margin-top:12px;font-size:.88em;min-height:18px"
       role="alert"></p>
  </div>

  <script>
    const API_URL = 'https://api-prestamos-mfr4.onrender.com';
    const token = new URLSearchParams(window.location.search).get('token');
    const PASS_RE = /^(?=.*[A-Z])(?=.*\d).{8,}$/;

    if (!token) {
      document.body.innerHTML = `
        <p style="text-align:center;color:#c62828;margin-top:40px;font-family:sans-serif">
          Enlace inválido o expirado. <a href="../index.html">Volver al inicio</a>
        </p>`;
    }

    function setReq(id, state) {
      const el = document.getElementById(id);
      el.className = state;
    }

    function onPassInput(val) {
      const bar  = document.getElementById('strengthBar');
      const list = document.getElementById('reqList');
      if (val) { bar.style.display='block'; list.style.display='flex'; }
      else     { bar.style.display='none';  list.style.display='none'; }

      const checks = {
        len:     val.length >= 8,
        upper:   /[A-Z]/.test(val),
        num:     /\d/.test(val),
        special: /[^A-Za-z0-9]/.test(val)
      };

      if (!val) {
        ['req-len','req-upper','req-num'].forEach(id => setReq(id, ''));
        setReq('req-special', 'optional');
      } else {
        setReq('req-len',     checks.len     ? 'pass' : 'fail');
        setReq('req-upper',   checks.upper   ? 'pass' : 'fail');
        setReq('req-num',     checks.num     ? 'pass' : 'fail');
        setReq('req-special', checks.special ? 'optional pass' : 'optional');
      }

      const score = [checks.len, checks.upper, checks.num, checks.special].filter(Boolean).length;
      const fill  = document.getElementById('strengthFill');
      const widths  = ['0%','33%','58%','80%','100%'];
      const colors  = ['transparent','#ef5350','#ff9800','#66bb6a','#2e7d32'];
      fill.style.width      = val ? widths[score]  : '0%';
      fill.style.background = val ? colors[score]  : 'transparent';

      onConfInput();
      updateSubmitBtn();
    }

    function onConfInput() {
      const p = document.getElementById('nuevaPass').value;
      const c = document.getElementById('confirmarPass').value;
      const msg = document.getElementById('confMsg');
      if (!c) { msg.textContent = ''; return; }
      if (p === c) { msg.style.color = '#2e7d32'; msg.textContent = '✓ Las contraseñas coinciden'; }
      else         { msg.style.color = '#c62828'; msg.textContent = 'Las contraseñas no coinciden'; }
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      const p   = document.getElementById('nuevaPass').value;
      const c   = document.getElementById('confirmarPass').value;
      const ok  = PASS_RE.test(p) && p === c;
      const btn = document.getElementById('btnReset');
      btn.disabled       = !ok;
      btn.style.opacity  = ok ? '1'           : '.5';
      btn.style.cursor   = ok ? 'pointer'     : 'not-allowed';
    }

    function toggleVis(id, btn) {
      const inp = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye','fa-eye-slash');
      } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash','fa-eye');
      }
    }

    document.getElementById('btnReset').addEventListener('click', async () => {
      const nuevaContrasena = document.getElementById('nuevaPass').value;
      const confirmar       = document.getElementById('confirmarPass').value;
      const msg             = document.getElementById('resetMsg');
      const btn             = document.getElementById('btnReset');

      msg.textContent = '';

      if (!nuevaContrasena || !confirmar) { msg.style.color='#c62828'; msg.textContent = 'Completa ambos campos'; return; }
      if (nuevaContrasena !== confirmar)  { msg.style.color='#c62828'; msg.textContent = 'Las contraseñas no coinciden'; return; }
      if (!PASS_RE.test(nuevaContrasena)) { msg.style.color='#c62828'; msg.textContent = 'La contraseña no cumple los requisitos mínimos'; return; }

      btn.disabled    = true;
      btn.textContent = 'Guardando...';

      try {
        const res  = await fetch(`${API_URL}/api/auth/reset-password`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, nuevaContrasena })
        });
        const data = await res.json();
        msg.style.color = res.ok ? 'green' : '#c62828';
        msg.textContent = data.message;
        if (res.ok) setTimeout(() => window.location.href = '../index.html', 2000);
      } catch {
        msg.style.color = '#c62828';
        msg.textContent = 'Error de conexión. Intenta de nuevo.';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Guardar contraseña';
        updateSubmitBtn();
      }
    });
  </script>
</body>
</html>
